name: Deploy to VPS

on:
  push:
    branches:
      - main
      - next-krish

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: BRANCH_NAME
          script: |
            echo "Starting Deployment..."
            cd /var/www/gidan-app

            echo "Deploying branch: $BRANCH_NAME"
            git fetch origin
            git reset --hard origin/$BRANCH_NAME

            # Clean old build and dependencies
            rm -rf node_modules .next package-lock.json

            npm install
            npm run build

            # Force stop and start (not restart) to pick up new build
            pm2 stop biotechmaali || true
            pm2 delete biotechmaali || true
            PORT=3000 pm2 start npm --name "biotechmaali" -- start
            pm2 save

            # Clear Nginx cache if exists
            rm -rf /var/cache/nginx/* || true
            nginx -s reload || true

            echo "Deployment Successful!"
            pm2 status
