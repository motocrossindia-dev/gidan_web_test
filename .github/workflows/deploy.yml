name: Deploy Gidan Web

on:
  push:
    branches:
      - main
      - dev_mohan

env:
  PROJECT_NAME: "gidan-app"
  SERVER_DIR: "/var/www/html/gidan-app"
  PM2_APP_NAME: "biotechmaali"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: BRANCH_NAME
          script: |
            echo "🚀 Starting Deployment for ${{ env.PROJECT_NAME }}..."

            # Go to project folder
            cd "${{ env.SERVER_DIR }}" || exit 1

            # Git Config
            git config --global --add safe.directory ${{ env.SERVER_DIR }}

            # Pull Code
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/$BRANCH_NAME

            # Clean Build
            rm -rf .next node_modules

            # Install Dependencies
            echo "📦 Installing dependencies..."
            npm install

            # Build
            echo "🔨 Building Next.js..."
            npm run build

            # PM2 — Reload or Start
            if pm2 describe ${{ env.PM2_APP_NAME }} > /dev/null 2>&1; then
                echo "✅ App '${{ env.PM2_APP_NAME }}' found. Reloading..."
                pm2 reload ${{ env.PM2_APP_NAME }}
            else
                echo "⚠️ App '${{ env.PM2_APP_NAME }}' NOT found. Starting fresh..."
                PORT=3002 pm2 start npm --name "${{ env.PM2_APP_NAME }}" -- start
            fi

            pm2 save

            echo "✅ Deployment Successful!"
            pm2 status