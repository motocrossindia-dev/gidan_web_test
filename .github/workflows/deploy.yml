
name: Standard VPS Deploy

# 1️⃣ Trigger Deployment
on:
  push:
    branches:
      - main
      - dev_mohan

# 2️⃣ Global Variables
env:
  PROJECT_NAME: "gidan_web_test"
  SERVER_DIR: "/var/www/html/gidan_web_test"
  PM2_APP_NAME: "gidan_web_test"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # STEP 1 — Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4


      # STEP 2 — Deploy to VPS
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script_stop: true

          script: |
            
            echo "===================================="
            echo "Starting Deployment"
            echo "Project: ${{ env.PROJECT_NAME }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "===================================="
            
            
            # 1️⃣ Go to project folder
            cd "${{ env.SERVER_DIR }}" || exit 1
            
            
            # 2️⃣ Fix Git Safe Directory Error
            git config --global --add safe.directory ${{ env.SERVER_DIR }}
            
            
            # 3️⃣ Pull Latest Code
            echo "Pulling latest code..."
            
            git fetch origin
            
            git reset --hard origin/${{ github.ref_name }}
            
            
            # 4️⃣ Clean Old Build
            echo "Cleaning old files..."
            
            rm -rf .next
            rm -rf node_modules
            rm -rf package-lock.json
            
            
            # 5️⃣ Install Dependencies
            echo "Installing dependencies..."
            
            npm install
            
            
            # 6️⃣ Build Next.js
            echo "Building Next.js..."
            
            npm run build
            
            
            # # 7️⃣ Restart PM2
            # echo "Restarting PM2..."
            
            pm2 restart ${{ env.PM2_APP_NAME }} ||PORT=3001 pm2 start npm --name "${{ env.PM2_APP_NAME }}" -- start
            
            
            # 8️⃣ Save PM2
            pm2 save
            
            
            # echo "===================================="
            echo "Deployment Successful"
            echo "===================================="
