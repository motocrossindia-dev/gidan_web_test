name: Deploy Gidan Web Test

on:
  push:
    branches:
      - main
      - dev_mohan

env:
  PROJECT_NAME: "gidan_web_test"
  SERVER_DIR: "/var/www/html/gidan_web_test"
  PM2_APP_NAME: "gidan_web_test"  # <-- This ensures we only touch the NEW app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            echo "🚀 Starting Deployment for ${{ env.PROJECT_NAME }}..."
            
            # Go to project folder
            cd "${{ env.SERVER_DIR }}" || exit 1
            
            # Git Config
            git config --global --add safe.directory ${{ env.SERVER_DIR }}
            
            # Pull Code
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # Clean Build (Keep package-lock.json)
            rm -rf .next node_modules
            
            # Install Dependencies
            echo "📦 Installing dependencies..."
            npm install
            
            # # Create .env.local with secrets
            # echo "📝 Creating environment file..."
            # cat > .env.local << EOF
            # NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            # NEXT_PUBLIC_EMAILJS_SERVICE_ID=${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
            # NEXT_PUBLIC_EMAILJS_TEMPLATE_ID=${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
            # NEXT_PUBLIC_EMAILJS_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
            # NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
            # NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            # EOF
            
            # Build
            echo "🔨 Building Next.js..."
            npm run build
             
            # --- PM2 LOGIC START --- g
            
            # 1. Check if the NEW app (gidan) is already running
            if pm2 describe ${{ env.PM2_APP_NAME }} > /dev/null 2>&1; then
                echo "✅ App '${{ env.PM2_APP_NAME }}' found. Reloading..."
                pm2 reload ${{ env.PM2_APP_NAME }}
            else
                echo "⚠️ App '${{ env.PM2_APP_NAME }}' NOT found. Starting fresh..."
                # Start on Port 3002
                PORT=3002 pm2 start npm --name "${{ env.PM2_APP_NAME }}" -- start
            fi
            
            # 2. Save the PM2 list (This saves BOTH apps, but doesn't stop them)
            pm2 save
            
            # --- PM2 LOGIC END ---

            echo "✅ Deployment Successful!"
            echo "🔍 Status:"
            pm2 status
