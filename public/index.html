<!-- Clear service worker cache to prevent caching issues -->
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
                registration.unregister();
            }
        });
    }

    // Clear browser cache for development
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) {
                    caches.delete(name);
                }
            });
        }
    }
</script>

<script>
    function updateLogoByTheme(isDark) {
        const favicon = document.getElementById("favicon");
        const appleIcon = document.getElementById("appleIcon");

        const baseUrl = window.location.origin;
        const ts = new Date().getTime(); // cache buster

        const logo = isDark
            ? `${baseUrl}/logo-white.png?v=${ts}`
            : `${baseUrl}/logo.png?v=${ts}`;

        if (favicon) favicon.href = logo;
        if (appleIcon) appleIcon.href = logo;

        console.log("Dark mode:", isDark);
        console.log("Favicon set to:", logo);
    }

    const darkModeQuery = window.matchMedia("(prefers-color-scheme: dark)");
    updateLogoByTheme(darkModeQuery.matches);

    darkModeQuery.addEventListener("change", (e) => {
        updateLogoByTheme(e.matches);
    });
</script>
